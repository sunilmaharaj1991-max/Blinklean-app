name: blinklean
description: "BlinKlean - India's 1st AI Powered QuickClean Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  http: ^1.6.0
  razorpay_flutter: ^1.4.1
  connectivity_plus: ^7.0.0
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  google_sign_in: ^6.2.1
  shared_preferences: ^2.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo_full.png
    - assets/images/logo_icon.png

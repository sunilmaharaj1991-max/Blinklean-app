name: blinklean
description: "BlinKlean - India's 1st AI Powered QuickClean Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  http: ^1.6.0
  razorpay_flutter: ^1.4.1
  connectivity_plus: ^6.0.1
  shared_preferences: ^2.3.0
  intl: ^0.20.2
  amplify_flutter: ^2.0.0
  amplify_auth_cognito: ^2.0.0
  amplify_api: ^2.0.0
  amplify_authenticator: ^2.0.0
  amplify_storage_s3: ^2.0.0
  animate_do: ^4.2.0
  geocoding: ^4.0.0
  google_maps_flutter: ^2.16.0
  font_awesome_flutter: ^11.0.0
  lottie: ^3.3.2
  flutter_animate: ^4.5.2
  pinput: ^5.0.0
  shimmer: 3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.1

flutter_native_splash:
  color: "#0F172A"
  image: assets/images/logo_icon.png
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo_full.png
    - assets/images/logo_icon.png
